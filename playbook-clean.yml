---
# playbook-clean.yml
# Version propre : nginx (root) gère le port 80/443, bunkerweb-ui (gunicorn)
# écoute sur 127.0.0.1:7000, le scheduler configure le reverse proxy automatiquement.
# Pas de sysctl hack, pas de surcharge de ui.env.

- name: Build OMI BunkerWeb AIO – Debian 13
  hosts: all
  become: true
  vars:
    bunkerweb_version: "1.6.11"

  tasks:

    # ── Mise à jour OS ──────────────────────────────────────────────────────

    - name: Attendre que dpkg soit disponible
      shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 3; done
      changed_when: false

    - name: Mise à jour complète du système
      apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Installer les paquets nécessaires
      apt:
        name:
          - curl
          - ca-certificates
          - gnupg2
          - python3
          - chrony
        state: present

    # ── Durcissement SSH ────────────────────────────────────────────────────

    - name: SSH – désactiver PasswordAuthentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart sshd

    - name: SSH – désactiver PermitRootLogin
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
      notify: Restart sshd

    # ── Installation BunkerWeb ──────────────────────────────────────────────

    - name: Télécharger install-bunkerweb.sh
      get_url:
        url: "https://github.com/bunkerity/bunkerweb/releases/download/v{{ bunkerweb_version }}/install-bunkerweb.sh"
        dest: /tmp/install-bunkerweb.sh
        mode: "0755"
        timeout: 120
      retries: 3
      delay: 5

    - name: Installer BunkerWeb Full Stack (sans Docker)
      # --full        : installe bunkerweb + scheduler + ui
      # --no-wizard   : pas d'assistant interactif
      # --no-tui      : pas d'interface TUI (gum/whiptail)
      # --ui-direct   : expose l'UI directement sur le port configuré (7000)
      #                 SANS passer par BunkerWeb en reverse proxy
      #                 → au premier boot, l'UI sera accessible sur :7000
      #                 Le first-boot reconfigurera ensuite selon le user-data
      # -y            : non-interactif
      shell: >
        bash /tmp/install-bunkerweb.sh
        --version {{ bunkerweb_version }}
        --full
        --no-wizard
        --no-tui
        --no-auto-backup
        -y
      environment:
        DEBIAN_FRONTEND: noninteractive
      async: 600
      poll: 15
      register: bw_install

    - name: Vérifier les services BunkerWeb
      stat:
        path: "/lib/systemd/system/{{ item }}.service"
      loop:
        - bunkerweb
        - bunkerweb-scheduler
        - bunkerweb-ui
      register: bw_units

    - name: Échouer si un service manque
      fail:
        msg: "{{ item.item }}.service manquant après installation"
      when: not item.stat.exists
      loop: "{{ bw_units.results }}"

    # ── Pas de surcharge de variables.env ni ui.env ─────────────────────────
    # On laisse les fichiers par défaut générés par install-bunkerweb.sh.
    # La configuration métier se fait au first-boot via user-data.

    # ── Script first-boot ───────────────────────────────────────────────────

    - name: Déployer le script first-boot
      copy:
        dest: /usr/local/sbin/bunkerweb-first-boot.sh
        owner: root
        mode: "0750"
        content: |
          #!/usr/bin/env bash
          # Exécuté une seule fois au premier démarrage de l'instance.
          #
          # Sans user-data : BunkerWeb démarre avec la config par défaut.
          #   L'UI est accessible sur http://<IP>:7000/
          #
          # Avec user-data (format KEY=VALUE, une par ligne) :
          #   BW_SERVER_NAME          FQDN du/des site(s) à protéger
          #   BW_REVERSE_PROXY_HOST   Upstream backend (ex: http://127.0.0.1:8000)
          #   BW_ADMIN_USERNAME       Identifiant admin UI (défaut: admin)
          #   BW_ADMIN_PASSWORD       Mot de passe admin UI
          #   BW_AUTO_LETSENCRYPT     yes/no
          #   BW_EMAIL_LETSENCRYPT    Email Let's Encrypt
          set -euo pipefail
          DONE_FLAG="/var/lib/bunkerweb/.first-boot-done"
          [ -f "$DONE_FLAG" ] && exit 0

          LOGFILE="/var/log/bunkerweb/first-boot.log"
          mkdir -p /var/log/bunkerweb
          exec >>"$LOGFILE" 2>&1
          echo "=== First-boot $(date -Iseconds) ==="

          # Lecture user-data via IMDS Outscale
          get_var() {
            curl -sf --max-time 3 "http://169.254.169.254/latest/user-data" 2>/dev/null \
              | grep "^${1}=" | cut -d'=' -f2- || true
          }

          set_env() {
            local k="$1" v="$2" f="${3:-/etc/bunkerweb/variables.env}"
            grep -q "^#\?${k}=" "$f" 2>/dev/null \
              && sed -i "s|^#\?${k}=.*|${k}=${v}|" "$f" \
              || echo "${k}=${v}" >> "$f"
            echo "[OK] ${k}=${v} -> ${f}"
          }

          SERVER_NAME=$(get_var BW_SERVER_NAME)
          PROXY_HOST=$(get_var BW_REVERSE_PROXY_HOST)
          ADMIN_USER=$(get_var BW_ADMIN_USERNAME)
          ADMIN_PASS=$(get_var BW_ADMIN_PASSWORD)
          LETSENCRYPT=$(get_var BW_AUTO_LETSENCRYPT)
          LE_EMAIL=$(get_var BW_EMAIL_LETSENCRYPT)

          if [ -n "$SERVER_NAME" ]; then
            echo "[INFO] Mode reverse proxy : $SERVER_NAME"
            set_env SERVER_NAME "$SERVER_NAME"
            [ -n "$PROXY_HOST"  ] && { set_env USE_REVERSE_PROXY yes; set_env REVERSE_PROXY_URL /; set_env REVERSE_PROXY_HOST "$PROXY_HOST"; }
            [ -n "$LETSENCRYPT" ] && set_env AUTO_LETS_ENCRYPT "$LETSENCRYPT"
            [ -n "$LE_EMAIL"    ] && set_env EMAIL_LETS_ENCRYPT "$LE_EMAIL"
          else
            echo "[INFO] Pas de SERVER_NAME – démarrage avec config par défaut (UI sur :7000)"
          fi

          if [ -n "$ADMIN_PASS" ]; then
            set_env ADMIN_USERNAME "${ADMIN_USER:-admin}" /etc/bunkerweb/ui.env
            set_env ADMIN_PASSWORD "$ADMIN_PASS" /etc/bunkerweb/ui.env
            chown root:nginx /etc/bunkerweb/ui.env
            chmod 660 /etc/bunkerweb/ui.env
          fi

          # Démarrer les services (le scheduler démarre nginx lui-même)
          echo "[INFO] Démarrage des services BunkerWeb..."
          systemctl start --no-block bunkerweb-scheduler || true
          systemctl start --no-block bunkerweb-ui || true

          touch "$DONE_FLAG"
          echo "=== First-boot terminé $(date -Iseconds) ==="

    - name: Déployer le service systemd first-boot
      copy:
        dest: /etc/systemd/system/bunkerweb-first-boot.service
        mode: "0644"
        content: |
          [Unit]
          Description=BunkerWeb first-boot configuration
          After=network-online.target cloud-init.service
          Wants=network-online.target
          ConditionPathExists=!/var/lib/bunkerweb/.first-boot-done
          Before=bunkerweb.service bunkerweb-scheduler.service bunkerweb-ui.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/bunkerweb-first-boot.sh
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    - name: Activer le service first-boot
      systemd:
        name: bunkerweb-first-boot
        enabled: true
        daemon_reload: true

    # ── Arrêt des services avant snapshot ──────────────────────────────────

    - name: Arrêter les services BunkerWeb (gardés enabled)
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: true
      loop:
        - bunkerweb-ui
        - bunkerweb-scheduler
        - bunkerweb
      failed_when: false

    - name: Nettoyer les fichiers temporaires
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/install-bunkerweb.sh
        - /var/lib/bunkerweb/db.sqlite3

  handlers:
    - name: Restart sshd
      systemd:
        name: ssh
        state: restarted
